site_name: Joch
site_description: Joch is the vendor-neutral control plane for AI agent fleets — inventory, governance, portability, observability, and release management for agents built with any SDK.
site_url: https://peasantsai.github.io/joch-docs/
repo_url: https://github.com/peasantsai/joch-docs
repo_name: peasantsai/joch-docs
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
theme:
  name: material
  language: en
  icon:
    logo: material/robot-outline
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: Source Code Pro
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
nav:
  - Home: index.md
  - Concepts:
      - Overview: concepts/index.md
      - Positioning: concepts/positioning.md
      - Five Pillars: concepts/five-pillars.md
      - Comparison: concepts/comparison.md
      - Glossary: concepts/glossary.md
  - Pillars:
      - Inventory: pillars/inventory.md
      - Governance: pillars/governance.md
      - Portability: pillars/portability.md
      - Observability: pillars/observability.md
      - Release Management: pillars/release-management.md
  - Architecture:
      - Overview: architecture/index.md
      - Control Plane: architecture/control-plane.md
      - Data Plane: architecture/data-plane.md
      - Framework Adapters: architecture/framework-adapters.md
      - Tool Gateway: architecture/tool-gateway.md
      - MCP Gateway: architecture/mcp-gateway.md
      - State Portability: architecture/state-portability.md
      - Policy Engine: architecture/policy-engine.md
      - Model Router: architecture/model-router.md
      - Trust and Security Model: architecture/trust-and-security-model.md
      - Service Architecture: architecture/service-architecture.md
  - Resources:
      - Overview: specs/index.md
      - Resource Model: specs/resource-model.md
      - Catalog:
          - Index: specs/kubernetes/index.md
          - Agent: specs/kubernetes/agent.md
          - FrameworkAdapter: specs/kubernetes/framework-adapter.md
          - Model: specs/kubernetes/model.md
          - ModelRoute: specs/kubernetes/model-route.md
          - Tool: specs/kubernetes/tool.md
          - MCPServer: specs/kubernetes/mcpserver.md
          - ToolCall: specs/kubernetes/toolcall.md
          - Policy: specs/kubernetes/policy.md
          - Approval: specs/kubernetes/approval.md
          - ABOM: specs/kubernetes/abom.md
          - Trace: specs/kubernetes/trace.md
          - Execution: specs/kubernetes/execution.md
          - Conversation: specs/kubernetes/conversation.md
          - StateCheckpoint: specs/kubernetes/state-checkpoint.md
          - Memory: specs/kubernetes/memory.md
          - RAG: specs/kubernetes/rag.md
          - KnowledgeSource: specs/kubernetes/knowledge-source.md
          - Artifact: specs/kubernetes/artifact.md
          - Secret: specs/kubernetes/secret.md
          - Budget: specs/kubernetes/budget.md
          - Eval: specs/kubernetes/eval.md
          - Deployment: specs/kubernetes/deployment.md
          - Environment: specs/kubernetes/environment.md
          - Team / Namespace: specs/kubernetes/team-namespace.md
          - Handoff: specs/kubernetes/handoff.md
  - AOS Conformance:
      - Overview: aos/index.md
      - ABOM (Inspect): aos/agbom.md
      - Hooks (Instrument): aos/hooks.md
      - Events (Trace): aos/events.md
      - CycloneDX Mapping: aos/cyclonedx-mapping.md
      - OpenTelemetry Mapping: aos/opentelemetry-mapping.md
      - OCSF Mapping: aos/ocsf-mapping.md
  - Use Cases:
      - Overview: use-cases/index.md
      - Fleet Inventory: use-cases/fleet-inventory.md
      - MCP Governance: use-cases/mcp-governance.md
      - Cross-Provider Migration: use-cases/cross-provider-migration.md
      - Cost Control: use-cases/cost-control.md
      - Release Gates: use-cases/release-gates.md
      - Approvals: use-cases/approvals.md
  - Business:
      - Overview: business/index.md
      - Product: business/product.md
      - Moat: business/moat.md
      - Competitive Landscape: business/competitive-landscape.md
      - Revenue Models: business/revenue-models.md
      - Target Audience: business/target-audience.md
      - Go-To-Market: business/go-to-market.md
      - Open-Core Strategy: business/open-core.md
      - Roadmap: business/roadmap.md
  - Platform:
      - Overview: platform/index.md
      - Kubernetes Role: platform/kubernetes.md
      - CRDs and Controllers: platform/crds-controllers.md
      - Deployment Modes: platform/deployment-modes.md
      - Product Strategy: platform/product-strategy.md
  - Product:
      - Brand: product/brand.md
      - Repository Strategy: product/repositories.md
  - Community:
      - Contributing: community/contributing.md
      - Governance: community/governance.md
      - License: community/license.md
plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_css:
  - stylesheets/extra.css
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/peasantsai/joch-docs
      name: Joch on GitHub
copyright: Copyright &copy; 2026 PeasantsAI &mdash; Joch is open source under Apache-2.0
