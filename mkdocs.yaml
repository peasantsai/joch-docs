site_name: Joch Docs
site_description: Joch agent control-plane architecture and product documentation.
site_url: https://peasantsai.github.io/joch-docs/
repo_url: https://github.com/peasantsai/joch-docs
repo_name: peasantsai/joch-docs
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
theme:
  name: material
  language: en
  icon:
    logo: material/robot-outline
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: Source Code Pro
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
nav:
  - Home: index.md
  - Architecture:
      - State Portability: architecture/state-portability.md
      - Service Architecture: architecture/service-architecture.md
  - Specs:
      - Overview: specs/index.md
      - Resource Model: specs/resource-model.md
      - Kubernetes:
          - Overview: specs/kubernetes/index.md
          - Agent: specs/kubernetes/agent.md
          - Model: specs/kubernetes/model.md
          - Personality: specs/kubernetes/personality.md
          - Prompt: specs/kubernetes/prompt.md
          - Skill: specs/kubernetes/skill.md
          - Tool: specs/kubernetes/tool.md
          - MCPServer: specs/kubernetes/mcpserver.md
          - Memory: specs/kubernetes/memory.md
          - RAG: specs/kubernetes/rag.md
          - KnowledgeSource: specs/kubernetes/knowledge-source.md
          - Plan: specs/kubernetes/plan.md
          - ExecutionLoop: specs/kubernetes/execution-loop.md
          - Execution: specs/kubernetes/execution.md
          - Deployment: specs/kubernetes/deployment.md
          - Policy: specs/kubernetes/policy.md
          - Guardrail: specs/kubernetes/guardrail.md
          - Trace: specs/kubernetes/trace.md
          - Artifact: specs/kubernetes/artifact.md
          - Secret: specs/kubernetes/secret.md
          - Budget: specs/kubernetes/budget.md
          - Eval: specs/kubernetes/eval.md
          - Environment: specs/kubernetes/environment.md
          - Team / Namespace: specs/kubernetes/team-namespace.md
          - ToolCall: specs/kubernetes/toolcall.md
          - Handoff: specs/kubernetes/handoff.md
          - Approval: specs/kubernetes/approval.md
          - Conversation: specs/kubernetes/conversation.md
          - StateCheckpoint: specs/kubernetes/state-checkpoint.md
  - Platform:
      - Overview: platform/index.md
      - Kubernetes Role: platform/kubernetes.md
      - Joch Control Plane: platform/control-plane.md
      - CRDs and Controllers: platform/crds-controllers.md
      - Deployment Modes: platform/deployment-modes.md
      - Product Strategy: platform/product-strategy.md
  - Product:
      - Brand: product/brand.md
      - Repository Strategy: product/repositories.md
plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_css:
  - stylesheets/extra.css
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/peasantsai/joch-docs
      name: Joch Docs on GitHub
copyright: Copyright &copy; 2026 PeasantsAI
