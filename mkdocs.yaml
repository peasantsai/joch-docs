site_name: Joch AI
site_description: Joch AI is the open MCP and tool-governance gateway for discovering, governing, approving, and auditing autonomous agent workforces.
site_url: https://peasantsai.github.io/joch-docs/
repo_url: https://github.com/peasantsai/joch-docs
repo_name: peasantsai/joch-docs
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
theme:
  name: material
  language: en
  icon:
    logo: material/shield-check-outline
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: Source Code Pro
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
nav:
  - Home: index.md
  - Get Started:
      - Overview: getting-started/index.md
      - Install: getting-started/install.md
      - First Agent: getting-started/first-agent.md
      - Govern MCP: getting-started/governing-mcp.md
  - Strategy:
      - Overview: strategy/index.md
      - Brand: strategy/brand.md
      - Positioning: strategy/positioning.md
      - Market Context: strategy/market.md
      - Business Model: strategy/business.md
      - Open Source Strategy: strategy/open-source.md
  - MVP:
      - Overview: mvp/index.md
      - Scope: mvp/scope.md
      - User Stories: mvp/user-stories.md
      - Roadmap: mvp/roadmap.md
      - Success Metrics: mvp/success-metrics.md
  - Architecture:
      - Overview: architecture/index.md
      - Services: architecture/services.md
      - Gateway: architecture/gateway.md
      - Policy and Approvals: architecture/policy-approvals.md
      - Data Model: architecture/data-model.md
      - Deployment: architecture/deployment.md
      - Integrations: architecture/integrations.md
  - Resources:
      - Overview: resources/index.md
      - Agent: resources/agent.md
      - Tool: resources/tool.md
      - MCPServer: resources/mcpserver.md
      - Policy: resources/policy.md
      - ToolCall: resources/toolcall.md
      - Approval: resources/approval.md
      - ABOM: resources/abom.md
      - Execution: resources/execution.md
      - TraceEvent: resources/trace-event.md
  - Reference:
      - Overview: reference/index.md
      - CLI: reference/cli.md
      - API: reference/api.md
      - Repositories: reference/repositories.md
  - Community:
      - Contributing: community/contributing.md
      - License: community/license.md
      - FAQ: community/faq.md
plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
extra_css:
  - stylesheets/extra.css
extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/peasantsai/joch-docs
      name: Joch AI on GitHub
copyright: Copyright (c) 2026 PeasantsAI. Joch AI is open source under Apache-2.0.
